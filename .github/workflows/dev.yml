name: Deploy ecocraft dev

on:
  push:
    branches:
      - develop

env:
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set image name
      run: echo "IMAGE_NAME=eco-gnome/eco-gnome-website" >> "$GITHUB_ENV"

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:dev-${{ github.sha }}

    - name: Build and push Migrator image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: DataMigrator/Dockerfile
        push: true
        provenance: false
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrator:dev
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-migrator:dev-${{ github.sha }}

    - name: Deploy to server via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SFTP_SERVER }}
        username: ${{ secrets.SFTP_USERNAME }}
        password: ${{ secrets.SFTP_PASSWORD }}
        script: |
          cd /home/ecocraft/ecognome-dev
          docker compose pull app
          docker compose up -d
